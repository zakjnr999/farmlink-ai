# Render Blueprint for FarmLink AI
# Docs: https://render.com/docs/blueprint-spec
#
# This provisions a managed PostgreSQL database and the backend web service.
# After the first deploy, set CORS_ORIGINS (and optionally the ADMIN_* secrets)
# in the Render dashboard, then seed the database from a one-off shell:
#   cd backend && npm run prisma:seed

databases:
  - name: farmlink-db
    plan: free
    databaseName: farmlink
    user: farmlink

services:
  - type: web
    name: farmlink-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    # Render sets NODE_ENV=production, which makes `npm ci` skip devDependencies
    # (Prisma CLI, TypeScript). --include=dev keeps them available for the build
    # and for `prisma migrate deploy` at startup. prisma generate runs pre-build.
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farmlink-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d
      # Comma-separated list of allowed frontend origins. Set this to your
      # deployed frontend URL(s) in the Render dashboard.
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: local
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      # Seeded admin account. Set a strong ADMIN_PASSWORD in the dashboard.
      - key: ADMIN_FULL_NAME
        value: FarmLink Administrator
      - key: ADMIN_PHONE_NUMBER
        value: '+233200000000'
      - key: ADMIN_EMAIL
        value: admin@farmlink.local
      - key: ADMIN_PASSWORD
        sync: false
