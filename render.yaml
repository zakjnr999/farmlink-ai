# Render Blueprint for FarmLink AI
# Docs: https://render.com/docs/blueprint-spec
#
# Database: use Supabase PostgreSQL (not Render Postgres).
# Migrations and seed are run from your laptop — NOT on Render startup —
# because Render cannot reliably reach Supabase direct db.* hosts (IPv6).
#
# After deploy:
#   1. Set DATABASE_URL to Supabase Session pooler URI (see README)
#   2. Run locally: npm run prisma:deploy && npm run prisma:seed

services:
  - type: web
    name: farmlink-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build
    # Do NOT run prisma migrate here — run migrations locally against Supabase.
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase Session pooler URI — set manually in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: local
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: ADMIN_FULL_NAME
        value: FarmLink Administrator
      - key: ADMIN_PHONE_NUMBER
        value: '+233200000000'
      - key: ADMIN_EMAIL
        value: admin@farmlink.local
      - key: ADMIN_PASSWORD
        sync: false
